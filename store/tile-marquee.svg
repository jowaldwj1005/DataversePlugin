<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 560" width="1400" height="560">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#005a9e"/>
      <stop offset="50%" style="stop-color:#0078d4"/>
      <stop offset="100%" style="stop-color:#00bcf2"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.1)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.18)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.06)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1400" height="560" fill="url(#bg)"/>
  <rect width="1400" height="560" fill="url(#shine)"/>

  <!-- Subtle grid -->
  <g stroke="rgba(255,255,255,0.05)" stroke-width="1">
    <line x1="0" y1="80" x2="1400" y2="80"/>
    <line x1="0" y1="160" x2="1400" y2="160"/>
    <line x1="0" y1="240" x2="1400" y2="240"/>
    <line x1="0" y1="320" x2="1400" y2="320"/>
    <line x1="0" y1="400" x2="1400" y2="400"/>
    <line x1="0" y1="480" x2="1400" y2="480"/>
    <line x1="140" y1="0" x2="140" y2="560"/>
    <line x1="280" y1="0" x2="280" y2="560"/>
    <line x1="420" y1="0" x2="420" y2="560"/>
    <line x1="560" y1="0" x2="560" y2="560"/>
    <line x1="700" y1="0" x2="700" y2="560"/>
    <line x1="840" y1="0" x2="840" y2="560"/>
    <line x1="980" y1="0" x2="980" y2="560"/>
    <line x1="1120" y1="0" x2="1120" y2="560"/>
    <line x1="1260" y1="0" x2="1260" y2="560"/>
  </g>

  <!-- Large icon (left) -->
  <g transform="translate(100, 160)">
    <rect x="-20" y="-20" width="200" height="200" rx="36" fill="rgba(255,255,255,0.15)"/>
    <!-- Database cylinders -->
    <ellipse cx="80" cy="28" rx="52" ry="18" fill="none" stroke="white" stroke-width="6"/>
    <path d="M28 28 v26 c0 10 23.4 18 52 18 s52-8 52-18 V28" fill="none" stroke="white" stroke-width="6"/>
    <path d="M28 54 v26 c0 10 23.4 18 52 18 s52-8 52-18 V54" fill="none" stroke="white" stroke-width="6"/>
    <path d="M28 80 v26 c0 10 23.4 18 52 18 s52-8 52-18 V80" fill="none" stroke="white" stroke-width="6"/>
    <!-- API brackets -->
    <path d="M8 58 l-10 14 10 14" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M152 58 l10 14 -10 14" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title block -->
  <text x="360" y="230" font-family="-apple-system, 'Segoe UI', Arial, sans-serif" font-size="80" font-weight="800" fill="white" letter-spacing="-2">Dataverse Toolkit</text>
  <text x="362" y="284" font-family="-apple-system, 'Segoe UI', Arial, sans-serif" font-size="26" font-weight="400" fill="rgba(255,255,255,0.8)" letter-spacing="0.5">Developer tools for Dynamics 365 &amp; Power Platform</text>

  <!-- Feature pills -->
  <g transform="translate(360, 330)">
    <!-- Pill 1 -->
    <rect x="0" y="0" width="160" height="38" rx="19" fill="url(#card-grad)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
    <text x="80" y="25" font-family="-apple-system, 'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">API Explorer</text>

    <!-- Pill 2 -->
    <rect x="176" y="0" width="180" height="38" rx="19" fill="url(#card-grad)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
    <text x="266" y="25" font-family="-apple-system, 'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">FetchXML Builder</text>

    <!-- Pill 3 -->
    <rect x="372" y="0" width="168" height="38" rx="19" fill="url(#card-grad)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
    <text x="456" y="25" font-family="-apple-system, 'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">Bulk Operations</text>

    <!-- Pill 4 -->
    <rect x="556" y="0" width="132" height="38" rx="19" fill="url(#card-grad)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
    <text x="622" y="25" font-family="-apple-system, 'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">ERD Viewer</text>

    <!-- Pill 5 -->
    <rect x="704" y="0" width="178" height="38" rx="19" fill="url(#card-grad)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
    <text x="793" y="25" font-family="-apple-system, 'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">Security Inspector</text>
  </g>

  <!-- Bottom tagline -->
  <text x="360" y="440" font-family="-apple-system, 'Segoe UI', Arial, sans-serif" font-size="18" font-weight="400" fill="rgba(255,255,255,0.55)">No backend · No dependencies · Runs in your browser</text>

  <!-- Decorative right-side abstract shapes -->
  <g opacity="0.08">
    <ellipse cx="1200" cy="200" rx="180" ry="60" fill="none" stroke="white" stroke-width="12"/>
    <path d="M1020 200 v52 c0 26 80 47 180 47 s180-21 180-47 V200" fill="none" stroke="white" stroke-width="12"/>
    <path d="M1020 252 v52 c0 26 80 47 180 47 s180-21 180-47 V252" fill="none" stroke="white" stroke-width="12"/>
    <path d="M1020 304 v52 c0 26 80 47 180 47 s180-21 180-47 V304" fill="none" stroke="white" stroke-width="12"/>
  </g>
</svg>
